<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#111827" />
  <meta name="robots" content="noindex,nofollow" />
  <title>입장권 QR</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a8a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: 24px;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.5);
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #eff6ff;
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      font-weight: 700;
    }
    p.lead {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    .qr-frame {
      background: #fff;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      display: inline-block;
      margin-bottom: 18px;
      min-width: 296px;
      min-height: 296px;
    }
    canvas#qr {
      display: block;
      width: 280px;
      height: 280px;
      image-rendering: pixelated;
      pointer-events: none;
      -webkit-user-drag: none;
    }
    .clock {
      font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }
    .clock-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-bottom: 14px;
    }
    .footer {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .error {
      background: #fef2f2;
      color: #b91c1c;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .error small { display: block; margin-top: 8px; opacity: 0.7; word-break: break-all; }
    @media (max-width: 360px) {
      canvas#qr { width: 240px; height: 240px; }
      .qr-frame { min-width: 256px; min-height: 256px; }
    }
  </style>
</head>
<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">
  <div class="card" id="card">
    <span class="badge">입장권</span>
    <h1>QR을 행사장에서 보여주세요</h1>
    <p class="lead">입장 시 1회만 사용 가능합니다.<br/>화면 밝기를 최대로 올려주세요.</p>

    <div class="qr-frame"><canvas id="qr"></canvas></div>

    <div class="clock" id="clock">--:--:--</div>
    <div class="clock-label">KST · 실시간</div>

    <div class="footer">스크린샷·캡처본은 사용할 수 없습니다.</div>
  </div>

  <script>
    /* QR 라이브러리 (qrious) - CDN 3중 폴백 */
    const SOURCES = [
      'https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js',
      'https://unpkg.com/qrious@4.0.2/dist/qrious.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js'
    ];

    function loadScript(idx) {
      return new Promise(function (resolve, reject) {
        if (idx >= SOURCES.length) { reject(new Error('all_cdn_failed')); return; }
        const s = document.createElement('script');
        s.src = SOURCES[idx];
        s.async = true;
        s.onload = resolve;
        s.onerror = function () { loadScript(idx + 1).then(resolve, reject); };
        document.head.appendChild(s);
      });
    }

    function showError(msg, detail) {
      document.getElementById('card').innerHTML =
        '<div class="error">' + msg +
        (detail ? '<small>' + detail + '</small>' : '') + '</div>';
    }

    /* 한국 표준시 실시간 시계 */
    function startClock() {
      const el = document.getElementById('clock');
      const fmt = new Intl.DateTimeFormat('ko-KR', {
        timeZone: 'Asia/Seoul',
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false
      });
      function tick() {
        const parts = fmt.formatToParts(new Date());
        const get = (t) => (parts.find(p => p.type === t) || {}).value || '';
        let hh = get('hour'); if (hh === '24') hh = '00';
        el.textContent =
          get('year') + '-' + get('month') + '-' + get('day') + '  ' +
          hh + ':' + get('minute') + ':' + get('second');
      }
      tick();
      setInterval(tick, 1000);
    }

    function start() {
      const params = new URLSearchParams(location.search);
      const token = (params.get('token') || params.get('t') || '').trim();
      if (!token) {
        showError('유효하지 않은 링크입니다.<br/>카카오톡 메시지의 링크를 다시 확인해 주세요.');
        return;
      }
      if (typeof QRious === 'undefined') {
        showError('QR 라이브러리를 불러오지 못했습니다.<br/>네트워크 연결을 확인하고 새로고침 해주세요.');
        return;
      }
      try {
        new QRious({
          element: document.getElementById('qr'),
          value: token,
          size: 560,
          level: 'M',
          background: '#ffffff',
          foreground: '#0f172a',
          padding: 8
        });
      } catch (e) {
        showError('QR을 생성하지 못했습니다.<br/>새로고침 해주세요.', String(e && e.message || e));
        return;
      }
      startClock();
      if ('wakeLock' in navigator) navigator.wakeLock.request('screen').catch(function () {});
    }

    loadScript(0).then(start, function (err) {
      showError(
        'QR 라이브러리를 불러오지 못했습니다.<br/>와이파이/모바일 데이터를 확인하고 새로고침 해주세요.',
        String(err && err.message || err)
      );
    });
  </script>
</body>
</html>
